---
server_hostname: pai
server_timezone: Etc/UTC

k3s_node_name: pai
k3s_channel: stable

admin_namespaces:
  - cobold
  - centaur
  - data
  - ci

base_packages:
  - apt-transport-https
  - bash-completion
  - build-essential
  - ca-certificates
  - conntrack
  - curl
  - fd-find
  - git
  - gnupg
  - htop
  - iptables
  - jq
  - lsb-release
  - make
  - pkg-config
  - pipx
  - python3
  - python3-apt
  - python3-launchpadlib
  - python3-pip
  - python3-venv
  - ripgrep
  - rsync
  - socat
  - software-properties-common
  - tmux
  - unattended-upgrades
  - unzip
  - zip

github_runner_user: github-runner
github_runner_name: pai
github_runner_dir: /opt/github-actions-runner/cobold-vs-hero
github_runner_repo_url: https://github.com/greg0x/cobold-vs-hero
github_runner_version: 2.335.1
github_runner_arch: x64
github_runner_checksum: sha256:4ef2f25285f0ae4477f1fe1e346db76d2f3ebf03824e2ddd1973a2819bf6c8cf
github_runner_labels:
  - pai
  - k3s
  - docker
github_runner_registration_token: "{{ lookup('env', 'GITHUB_RUNNER_REGISTRATION_TOKEN') }}"

cert_manager_namespace: cert-manager
cert_manager_chart_version: v1.20.3
cert_manager_cluster_issuer: letsencrypt-prod
cert_manager_acme_email: admin@pragmatic-ai.engineer
cert_manager_acme_server: https://acme-v02.api.letsencrypt.org/directory
cert_manager_http01_ingress_class: traefik

helm_apt_key_id: DDF78C3E6EBB2D2CC223C95C62BA89D07698DBC6
helm_apt_key_url: https://packages.buildkite.com/helm-linux/helm-debian/gpgkey
helm_apt_keyring: /usr/share/keyrings/helm.gpg
helm_apt_uri: https://packages.buildkite.com/helm-linux/helm-debian/any/
