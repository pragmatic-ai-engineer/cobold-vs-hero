---
server_hostname: pai
server_timezone: Etc/UTC

k3s_node_name: pai
k3s_channel: stable

admin_namespaces:
  - cobold
  - centaur
  - data
  - ci

base_packages:
  - apt-transport-https
  - bash-completion
  - build-essential
  - ca-certificates
  - conntrack
  - curl
  - fd-find
  - git
  - gnupg
  - htop
  - iptables
  - jq
  - lsb-release
  - make
  - pkg-config
  - pipx
  - python3
  - python3-apt
  - python3-launchpadlib
  - python3-pip
  - python3-venv
  - ripgrep
  - rsync
  - socat
  - software-properties-common
  - tmux
  - unattended-upgrades
  - unzip
  - zip

github_runner_user: github-runner
github_runner_name: pai
github_runner_dir: /opt/github-actions-runner/cobold-vs-hero
github_runner_count: 6
github_runner_repo_url: https://github.com/greg0x/cobold-vs-hero
github_runner_version: 2.335.1
github_runner_arch: x64
github_runner_checksum: sha256:4ef2f25285f0ae4477f1fe1e346db76d2f3ebf03824e2ddd1973a2819bf6c8cf
github_runner_labels:
  - pai
  - k3s
  - docker
github_runner_registration_token: "{{ lookup('env', 'GITHUB_RUNNER_REGISTRATION_TOKEN') }}"

# Matches @playwright/test 1.61.1 Chromium install-deps for Ubuntu x64.
playwright_chromium_tool_packages:
