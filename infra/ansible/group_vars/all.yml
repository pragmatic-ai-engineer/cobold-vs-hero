  - fonts-unifont
  - libfontconfig1
  - libfreetype6
  - xfonts-cyrillic
  - xfonts-scalable
  - fonts-liberation
  - fonts-ipafont-gothic
  - fonts-wqy-zenhei
  - fonts-tlwg-loma-otf
  - fonts-freefont-ttf
playwright_chromium_packages_by_ubuntu_version:
  "22.04":
    - libasound2
    - libatk-bridge2.0-0
    - libatk1.0-0
    - libatspi2.0-0
    - libcairo2
    - libcups2
    - libdbus-1-3
    - libdrm2
    - libgbm1
    - libglib2.0-0
    - libnspr4
    - libnss3
    - libpango-1.0-0
    - libwayland-client0
    - libx11-6
    - libxcb1
    - libxcomposite1
    - libxdamage1
    - libxext6
    - libxfixes3
    - libxkbcommon0
    - libxrandr2
  "24.04":
    - libasound2t64
    - libatk-bridge2.0-0t64
    - libatk1.0-0t64
    - libatspi2.0-0t64
    - libcairo2
    - libcups2t64
    - libdbus-1-3
    - libdrm2
    - libgbm1
    - libglib2.0-0t64
    - libnspr4
    - libnss3
    - libpango-1.0-0
    - libx11-6
