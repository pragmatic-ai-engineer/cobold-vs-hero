---
- name: Ensure GitHub runner directory exists
  ansible.builtin.file:
    path: "{{ github_runner_instance_dir }}"
    state: directory
    owner: "{{ github_runner_user }}"
    group: "{{ github_runner_user }}"
    mode: "0750"

- name: Extract GitHub Actions runner
  ansible.builtin.unarchive:
    src: "/tmp/actions-runner-linux-{{ github_runner_arch }}-{{ github_runner_version }}.tar.gz"
    dest: "{{ github_runner_instance_dir }}"
    remote_src: true
    owner: "{{ github_runner_user }}"
    group: "{{ github_runner_user }}"
    creates: "{{ github_runner_instance_dir }}/config.sh"

- name: Install GitHub Actions runner package dependencies
  ansible.builtin.command: ./bin/installdependencies.sh
  args:
    chdir: "{{ github_runner_instance_dir }}"
  changed_when: false

- name: Check whether GitHub Actions runner is configured
  ansible.builtin.stat:
    path: "{{ github_runner_instance_dir }}/.runner"
  register: github_runner_config

- name: Require GitHub runner registration token for first install
  ansible.builtin.assert:
    that:
      - github_runner_registration_token is defined
      - github_runner_registration_token | length > 0
    fail_msg: Export GITHUB_RUNNER_REGISTRATION_TOKEN before first runner registration.
  when: not github_runner_config.stat.exists
  no_log: true

- name: Register GitHub Actions runner
  ansible.builtin.command: >
    ./config.sh
    --url {{ github_runner_repo_url }}
    --token {{ github_runner_registration_token }}
    --name {{ github_runner_instance_name }}
    --labels {{ github_runner_labels | join(',') }}
    --work _work
    --unattended
    --replace
  args:
    chdir: "{{ github_runner_instance_dir }}"
  become_user: "{{ github_runner_user }}"
  when: not github_runner_config.stat.exists
  no_log: true

- name: Check whether GitHub Actions runner service is installed
  ansible.builtin.stat:
    path: "{{ github_runner_instance_dir }}/.service"
  register: github_runner_service_marker

- name: Install GitHub Actions runner systemd service
  ansible.builtin.command: "./svc.sh install {{ github_runner_user }}"
  args:
    chdir: "{{ github_runner_instance_dir }}"
  when: not github_runner_service_marker.stat.exists

- name: Read GitHub Actions runner service name
  ansible.builtin.slurp:
    path: "{{ github_runner_instance_dir }}/.service"
  register: github_runner_service_name_file

- name: Ensure GitHub Actions runner service is enabled and running
  ansible.builtin.systemd:
    name: "{{ github_runner_service_name_file.content | b64decode | trim }}"
    enabled: true
    state: started
