---
- name: Bootstrap the pai single-node K3s server
  hosts: pai
  gather_facts: false
  become: true

  pre_tasks:
    - name: Ensure Python is available for Ansible modules
      ansible.builtin.raw: test -e /usr/bin/python3 || (apt-get update && apt-get install -y python3)
      changed_when: false
      tags: always

    - name: Gather facts
      ansible.builtin.setup:
      tags: always

    - name: Require host-specific public IPv4
      ansible.builtin.assert:
        that:
          - public_ipv4 is defined
          - public_ipv4 | length > 0
          - public_ipv4 is match('^[0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+$')
        fail_msg: Set public_ipv4 in ignored host_vars/pai/local.yml before running this playbook.
      tags: always

  tasks:
    - name: Set hostname
      ansible.builtin.hostname:
        name: "{{ server_hostname }}"

    - name: Read current timezone
      ansible.builtin.command: timedatectl show -p Timezone --value
      register: current_timezone
      changed_when: false

    - name: Set timezone
      ansible.builtin.command: timedatectl set-timezone {{ server_timezone }}
      when: current_timezone.stdout != server_timezone

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base packages
      ansible.builtin.apt:
        name: "{{ base_packages }}"
        state: present

    - name: Ensure SSH config directory exists
      ansible.builtin.file:
        path: /etc/ssh/sshd_config.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Ensure journald config directory exists
      ansible.builtin.file:
        path: /etc/systemd/journald.conf.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Check mise apt repository
      ansible.builtin.shell: |
        grep -R "ppa.launchpadcontent.net/jdxcode/mise" /etc/apt/sources.list /etc/apt/sources.list.d 2>/dev/null || true
      register: mise_apt_repo
      changed_when: false

    - name: Install mise apt repository
      ansible.builtin.command: add-apt-repository -y ppa:jdxcode/mise
      when: mise_apt_repo.stdout == ""
      register: mise_apt_repo_added

    - name: Refresh apt cache after mise repository change
      ansible.builtin.apt:
        update_cache: true
      when: mise_apt_repo_added.changed

    - name: Install mise
      ansible.builtin.apt:
        name: mise
        state: present

    - name: Configure mise activation for interactive bash shells
      ansible.builtin.copy:
        dest: /etc/profile.d/mise.sh
        owner: root
        group: root
        mode: "0644"
        content: |
          if command -v mise >/dev/null 2>&1; then
            eval "$(mise activate bash 2>/dev/null || true)"
          fi

    - name: Harden SSH daemon
      ansible.builtin.copy:
        dest: /etc/ssh/sshd_config.d/99-pai-hardening.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          PasswordAuthentication no
          KbdInteractiveAuthentication no
          PermitRootLogin prohibit-password
          X11Forwarding no
      notify: Restart ssh

    - name: Limit journald disk usage
      ansible.builtin.copy:
        dest: /etc/systemd/journald.conf.d/99-pai-size.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          [Journal]
          SystemMaxUse=1G
          RuntimeMaxUse=512M
      notify: Restart journald

    - name: Load Kubernetes kernel modules at boot
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          br_netfilter
          overlay

    - name: Load Kubernetes kernel modules now
      ansible.builtin.command: modprobe {{ item }}
      changed_when: false
      loop:
        - br_netfilter
        - overlay

    - name: Configure sysctl for Kubernetes and local databases
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-pai-kubernetes.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward = 1
          fs.inotify.max_user_watches = 1048576
          fs.inotify.max_user_instances = 1024
          vm.max_map_count = 262144
      notify: Apply sysctl

    - name: Flush handlers before K3s install
      ansible.builtin.meta: flush_handlers

    - name: Download Helm apt key
      ansible.builtin.get_url:
        url: "{{ helm_apt_key_url }}"
        dest: /tmp/helm.gpg
        mode: "0644"

    - name: Read Helm apt key fingerprint
      ansible.builtin.command: gpg --show-keys --with-colons /tmp/helm.gpg
      register: helm_key
      changed_when: false

    - name: Verify Helm apt key fingerprint
      ansible.builtin.assert:
        that:
          - helm_apt_key_id in helm_key.stdout
        fail_msg: Helm apt key fingerprint did not match the expected upstream key.

    - name: Install Helm apt keyring
      ansible.builtin.command: gpg --dearmor --yes --output {{ helm_apt_keyring }} /tmp/helm.gpg
      args:
        creates: "{{ helm_apt_keyring }}"

    - name: Add Helm apt repository
      ansible.builtin.deb822_repository:
        name: helm-stable-debian
        types:
          - deb
        uris:
          - "{{ helm_apt_uri }}"
        suites:
          - any
        components:
          - main
        signed_by: "{{ helm_apt_keyring }}"
        state: present
      register: helm_apt_repo_added

    - name: Refresh apt cache after Helm repository change
      ansible.builtin.apt:
        update_cache: true
      when: helm_apt_repo_added.changed

    - name: Install Helm
      ansible.builtin.apt:
        name: helm
        state: present

    - name: Ensure K3s config directory exists
      ansible.builtin.file:
        path: /etc/rancher/k3s
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Configure K3s server
      ansible.builtin.copy:
        dest: /etc/rancher/k3s/config.yaml
        owner: root
        group: root
        mode: "0600"
        content: |
          node-name: "{{ k3s_node_name }}"
          write-kubeconfig-mode: "0600"
          secrets-encryption: true
          tls-san:
            - "{{ public_ipv4 }}"
            - "{{ k3s_node_name }}"
      notify: Restart k3s

    - name: Download K3s installer
      ansible.builtin.get_url:
        url: https://get.k3s.io
        dest: /usr/local/src/k3s-install.sh
        mode: "0755"

    - name: Check for K3s binary
      ansible.builtin.stat:
        path: /usr/local/bin/k3s
      register: k3s_binary

    - name: Install K3s
      ansible.builtin.command: /usr/local/src/k3s-install.sh
      environment:
        INSTALL_K3S_CHANNEL: "{{ k3s_channel }}"
      when: not k3s_binary.stat.exists

    - name: Ensure K3s is enabled and running
      ansible.builtin.systemd:
        name: k3s
        enabled: true
        state: started

    - name: Flush K3s restart handler if config changed
      ansible.builtin.meta: flush_handlers

    - name: Configure root kubeconfig environment
      ansible.builtin.copy:
        dest: /etc/profile.d/k3s.sh
        owner: root
        group: root
        mode: "0644"
        content: |
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

    - name: Ensure root kube directory exists
      ansible.builtin.file:
        path: /root/.kube
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Link root kubeconfig
      ansible.builtin.file:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /root/.kube/config
        state: link
        force: true

    - name: Wait for K3s node to be ready
      ansible.builtin.command: /usr/local/bin/k3s kubectl get nodes
      register: k3s_nodes
      changed_when: false
      retries: 30
      delay: 5
      until: k3s_nodes.rc == 0

    - name: Create platform namespaces
      ansible.builtin.shell: |
        set -o pipefail
        /usr/local/bin/k3s kubectl create namespace {{ item }} --dry-run=client -o yaml |
        /usr/local/bin/k3s kubectl apply -f -
      args:
        executable: /bin/bash
      loop: "{{ admin_namespaces }}"
      changed_when: false
      register: namespace_result

    - name: Ensure operational directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - /opt/pai
        - /opt/pai/apps
        - /opt/pai/backups
        - /opt/pai/state

    - name: Install cert-manager with CRDs
      ansible.builtin.command: >
        helm upgrade --install cert-manager cert-manager
        --repo https://charts.jetstack.io
        --namespace {{ cert_manager_namespace }}
        --create-namespace
        --version {{ cert_manager_chart_version }}
        --set crds.enabled=true
        --set crds.keep=true
        --wait
        --timeout 5m
      register: cert_manager_install
      changed_when: "'has been installed' in cert_manager_install.stdout or 'has been upgraded' in cert_manager_install.stdout"
      tags: tls

    - name: Wait for cert-manager deployments
      ansible.builtin.command: kubectl -n {{ cert_manager_namespace }} rollout status deploy/{{ item }} --timeout=180s
      changed_when: false
      loop:
        - cert-manager
        - cert-manager-cainjector
        - cert-manager-webhook
      tags: tls

    - name: Configure Let's Encrypt ClusterIssuer
      ansible.builtin.copy:
        dest: /tmp/pai-letsencrypt-clusterissuer.yaml
        owner: root
        group: root
        mode: "0644"
        content: |
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: {{ cert_manager_cluster_issuer }}
          spec:
            acme:
              email: {{ cert_manager_acme_email }}
              server: {{ cert_manager_acme_server }}
              privateKeySecretRef:
                name: {{ cert_manager_cluster_issuer }}-account-key
              solvers:
                - http01:
                    ingress:
                      ingressClassName: {{ cert_manager_http01_ingress_class }}
      tags: tls

    - name: Apply Let's Encrypt ClusterIssuer
      ansible.builtin.command: kubectl apply -f /tmp/pai-letsencrypt-clusterissuer.yaml
      register: cert_manager_issuer_apply
      changed_when: "'created' in cert_manager_issuer_apply.stdout or 'configured' in cert_manager_issuer_apply.stdout"
      tags: tls

    - name: Wait for Let's Encrypt ClusterIssuer
      ansible.builtin.command: kubectl wait --for=condition=Ready clusterissuer/{{ cert_manager_cluster_issuer }} --timeout=120s
      changed_when: false
      tags: tls

    - name: Require Cloudflare API token for wildcard TLS
      ansible.builtin.assert:
        that:
          - cert_manager_cloudflare_api_token | length > 0
        fail_msg: Set CLOUDFLARE_API_TOKEN before running TLS bootstrap. The token needs Cloudflare Zone DNS Edit access for pragmatic-ai.engineer.
      when: cert_manager_wildcard_tls_enabled
      tags: tls

    - name: Configure cert-manager Cloudflare API token Secret
      ansible.builtin.command: kubectl apply -f -
      args:
        stdin: |
          apiVersion: v1
          kind: Secret
          metadata:
            name: {{ cert_manager_cloudflare_api_token_secret }}
            namespace: {{ cert_manager_namespace }}
          type: Opaque
          stringData:
            {{ cert_manager_cloudflare_api_token_secret_key }}: {{ cert_manager_cloudflare_api_token | quote }}
      register: cert_manager_cloudflare_secret_apply
      changed_when: "'created' in cert_manager_cloudflare_secret_apply.stdout or 'configured' in cert_manager_cloudflare_secret_apply.stdout"
      no_log: true
      when: cert_manager_wildcard_tls_enabled
      tags: tls

    - name: Configure Let's Encrypt DNS-01 ClusterIssuer
      ansible.builtin.command: kubectl apply -f -
      args:
        stdin: |
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: {{ cert_manager_dns01_cluster_issuer }}
          spec:
            acme:
              email: {{ cert_manager_acme_email }}
              server: {{ cert_manager_acme_server }}
              privateKeySecretRef:
                name: {{ cert_manager_dns01_cluster_issuer }}-account-key
              solvers:
                - selector:
                    dnsZones:
                      - {{ cert_manager_wildcard_tls_dns_zone | quote }}
                  dns01:
                    cloudflare:
                      apiTokenSecretRef:
                        name: {{ cert_manager_cloudflare_api_token_secret }}
                        key: {{ cert_manager_cloudflare_api_token_secret_key }}
      register: cert_manager_dns01_issuer_apply
      changed_when: "'created' in cert_manager_dns01_issuer_apply.stdout or 'configured' in cert_manager_dns01_issuer_apply.stdout"
      when: cert_manager_wildcard_tls_enabled
      tags: tls

    - name: Wait for Let's Encrypt DNS-01 ClusterIssuer
      ansible.builtin.command: kubectl wait --for=condition=Ready clusterissuer/{{ cert_manager_dns01_cluster_issuer }} --timeout=120s
      changed_when: false
      when: cert_manager_wildcard_tls_enabled
      tags: tls

    - name: Configure pragmatic-ai.engineer wildcard Certificate
      ansible.builtin.command: kubectl apply -f -
      args:
        stdin: |
          apiVersion: cert-manager.io/v1
          kind: Certificate
          metadata:
            name: {{ cert_manager_wildcard_tls_certificate }}
            namespace: {{ cert_manager_wildcard_tls_namespace }}
          spec:
            secretName: {{ cert_manager_wildcard_tls_secret }}
            issuerRef:
              name: {{ cert_manager_dns01_cluster_issuer }}
              kind: ClusterIssuer
            dnsNames:
          {% for dns_name in cert_manager_wildcard_tls_dns_names %}
              - {{ dns_name | quote }}
          {% endfor %}
      register: cert_manager_wildcard_certificate_apply
      changed_when: "'created' in cert_manager_wildcard_certificate_apply.stdout or 'configured' in cert_manager_wildcard_certificate_apply.stdout"
      when: cert_manager_wildcard_tls_enabled
      tags: tls

    - name: Configure Traefik default TLSStore
      ansible.builtin.command: kubectl apply -f -
      args:
        stdin: |
          apiVersion: traefik.io/v1alpha1
          kind: TLSStore
          metadata:
            name: default
            namespace: {{ cert_manager_wildcard_tls_namespace }}
          spec:
            defaultCertificate:
              secretName: {{ cert_manager_wildcard_tls_secret }}
      register: traefik_tlsstore_apply
      changed_when: "'created' in traefik_tlsstore_apply.stdout or 'configured' in traefik_tlsstore_apply.stdout"
      when: cert_manager_wildcard_tls_enabled
      tags: tls

    - name: Wait for pragmatic-ai.engineer wildcard Certificate
      ansible.builtin.command: kubectl -n {{ cert_manager_wildcard_tls_namespace }} wait --for=condition=Ready certificate/{{ cert_manager_wildcard_tls_certificate }} --timeout=300s
      changed_when: false
      when: cert_manager_wildcard_tls_enabled
      tags: tls

    - name: Install Docker for GitHub Actions image builds
      ansible.builtin.apt:
        name:
          - acl
          - docker.io
        state: present
        update_cache: true
      tags: github_runner

    - name: Ensure Docker is enabled and running
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started
      tags: github_runner

    - name: Ensure GitHub runner user exists
      ansible.builtin.user:
        name: "{{ github_runner_user }}"
        home: "/home/{{ github_runner_user }}"
        shell: /bin/bash
        groups:
          - docker
        append: true
        create_home: true
      tags: github_runner

    - name: Download GitHub Actions runner
      ansible.builtin.get_url:
        url: "https://github.com/actions/runner/releases/download/v{{ github_runner_version }}/actions-runner-linux-{{ github_runner_arch }}-{{ github_runner_version }}.tar.gz"
        dest: "/tmp/actions-runner-linux-{{ github_runner_arch }}-{{ github_runner_version }}.tar.gz"
        checksum: "{{ github_runner_checksum }}"
        mode: "0644"
      tags: github_runner

    - name: Configure GitHub Actions runner instances
      ansible.builtin.include_tasks:
        file: tasks/github-runner-instance.yml
        apply:
          tags: github_runner
      loop: "{{ range(1, github_runner_count + 1) | list }}"
      loop_control:
        loop_var: github_runner_instance_index
      vars:
        github_runner_instance_name: >-
          {{ github_runner_name if github_runner_instance_index == 1 else github_runner_name ~ '-' ~ (github_runner_instance_index | string) }}
        github_runner_instance_dir: >-
          {{ github_runner_dir if github_runner_instance_index == 1 else github_runner_dir ~ '-' ~ (github_runner_instance_index | string) }}
      tags: github_runner

    - name: Ensure needrestart does not restart runner during jobs
      ansible.builtin.file:
        path: /etc/needrestart/conf.d
        state: directory
        owner: root
        group: root
        mode: "0755"
      tags: github_runner

    - name: Configure needrestart runner service override
      ansible.builtin.copy:
        dest: /etc/needrestart/conf.d/actions_runner_services.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          $nrconf{override_rc}{qr(^actions\.runner\..+\.service$)} = 0;
      tags: github_runner

    - name: Ensure GitHub runner kube directory exists
      ansible.builtin.file:
        path: "/home/{{ github_runner_user }}/.kube"
        state: directory
        owner: "{{ github_runner_user }}"
        group: "{{ github_runner_user }}"
        mode: "0700"
      tags: github_runner

    - name: Copy K3s kubeconfig for GitHub runner
      ansible.builtin.copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "/home/{{ github_runner_user }}/.kube/config"
        remote_src: true
        owner: "{{ github_runner_user }}"
        group: "{{ github_runner_user }}"
        mode: "0600"
      tags: github_runner

    - name: Ensure local generated directory exists
      ansible.builtin.file:
        path: "{{ playbook_dir }}/.generated"
        state: directory
        mode: "0700"
      delegate_to: localhost
      become: false

    - name: Fetch admin kubeconfig
      ansible.builtin.fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ playbook_dir }}/.generated/kubeconfig-{{ inventory_hostname }}"
        flat: true

    - name: Point fetched kubeconfig at the public API endpoint
      ansible.builtin.replace:
        path: "{{ playbook_dir }}/.generated/kubeconfig-{{ inventory_hostname }}"
        regexp: "https://(127\\.0\\.0\\.1|localhost):6443"
        replace: "https://{{ public_ipv4 }}:6443"
      delegate_to: localhost
      become: false

    - name: Check whether reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Show bootstrap summary
      ansible.builtin.debug:
        msg:
          - "K3s is installed on {{ inventory_hostname }}."
          - "Fetched kubeconfig: {{ playbook_dir }}/.generated/kubeconfig-{{ inventory_hostname }}"
          - "Remote kubectl: ssh {{ inventory_hostname }} 'kubectl get nodes -o wide'"
          - "Reboot required: {{ reboot_required.stat.exists }}"

  handlers:
    - name: Restart ssh
      ansible.builtin.systemd:
        name: ssh
        state: restarted

    - name: Restart journald
      ansible.builtin.systemd:
        name: systemd-journald
        state: restarted

    - name: Apply sysctl
      ansible.builtin.command: sysctl --system
      changed_when: true

    - name: Restart k3s
      ansible.builtin.systemd:
        name: k3s
        state: restarted
      when: k3s_binary is defined and k3s_binary.stat.exists
