openapi: 3.0.3
info:
  title: Cobold vs Hero Briefing API
  version: 0.1.0
paths:
  /api/cobold-vs-hero/status:
    get:
      summary: Return BFF and backend runtime status
      operationId: getSystemStatus
      responses:
        '200':
          description: Runtime status for the BFF and Java backend
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemStatusResponse'
  /api/cobold-vs-hero/briefing:
    post:
      summary: Create a review briefing for a proposed delivery move
      operationId: createBriefing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BriefingRequest'
            examples:
              shieldWall:
                value:
                  coboldConcern: production payment integration refactor goes to release
                  heroMove: rewrite the flow quickly
                  systemMood: panic
      responses:
        '200':
          description: Briefing generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BriefingResponse'
components:
  schemas:
    ServiceStatus:
      type: object
      required:
        - service
        - runtime
        - status
        - checkedAt
        - endpoint
      properties:
        service:
          type: string
          enum: [bff-nestjs, be-java]
        runtime:
          type: string
          enum: [nestjs, spring-boot]
        status:
          type: string
          enum: [UP, DOWN]
        checkedAt:
          type: string
          format: date-time
        endpoint:
          type: string
        detail:
          type: string
    SystemStatusResponse:
      type: object
      required:
        - status
        - checkedAt
        - services
      properties:
        status:
          type: string
          enum: [UP, DEGRADED]
        checkedAt:
          type: string
          format: date-time
        services:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/ServiceStatus'
    BriefingRequest:
      type: object
      required:
        - coboldConcern
        - heroMove
        - systemMood
        - targetEnvironment
        - implementationComplexity
        - teamExperience
      properties:
        coboldConcern:
          type: string
        heroMove:
          type: string
        systemMood:
          type: string
        targetEnvironment:
          type: string
          enum: [dev, staging, production]
        implementationComplexity:
          type: string
          enum: [low, medium, high]
        teamExperience:
          type: string
          enum: [junior, senior, expert]
    BriefingResponse:
      type: object
      required:
        - signal
        - headline
        - reason
        - coboldWisdom
        - heroNextStep
        - evidencePrompts
        - checklist
      properties:
        signal:
          type: string
          enum: [truce, sparring, shield-wall]
        headline:
          type: string
        reason:
          type: string
        coboldWisdom:
          type: string
        heroNextStep:
          type: string
        evidencePrompts:
          type: array
          items:
            type: string
        checklist:
          type: array
          items:
            type: string
