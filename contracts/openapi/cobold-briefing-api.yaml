openapi: 3.0.3
info:
  title: Cobold vs Hero Briefing API
  version: 0.2.0
paths:
  /api/cobold-vs-hero/status:
    get:
      summary: Return BFF and backend runtime status
      operationId: getSystemStatus
      responses:
        '200':
          description: Runtime status for the BFF and Java backend
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemStatusResponse'
  /api/cobold-vs-hero/briefing:
    post:
      summary: Create a review readiness matrix for a proposed delivery move
      operationId: createBriefing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BriefingRequest'
            examples:
              shieldWall:
                value:
                  changeTitle: Payment retry refactor
                  changeDescription: Refactor production payment retry flow and auth callback in one release.
                  affectedSurfaces: [backend, bff, frontend, contract, testing]
                  providedEvidence: [hld]
                  riskFlags: [production, payment, auth, unclear-scope]
      responses:
        '200':
          description: Readiness briefing generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BriefingResponse'
components:
  schemas:
    ServiceStatus:
      type: object
      required:
        - service
        - runtime
        - status
        - checkedAt
        - endpoint
      properties:
        service:
          type: string
          enum: [bff-nestjs, be-java]
        runtime:
          type: string
          enum: [nestjs, spring-boot]
        status:
          type: string
          enum: [UP, DOWN]
        checkedAt:
          type: string
          format: date-time
        endpoint:
          type: string
        detail:
          type: string
    SystemStatusResponse:
      type: object
      required:
        - status
        - checkedAt
        - services
      properties:
        status:
          type: string
          enum: [UP, DEGRADED]
        checkedAt:
          type: string
          format: date-time
        services:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/ServiceStatus'
    BriefingRequest:
      type: object
      required:
        - changeTitle
        - changeDescription
        - affectedSurfaces
        - providedEvidence
        - riskFlags
      properties:
        changeTitle:
          type: string
        changeDescription:
          type: string
        affectedSurfaces:
          type: array
          minItems: 1
          items:
            type: string
            enum: [backend, bff, frontend, contract, testing]
        providedEvidence:
          type: array
          items:
            type: string
            enum: [backend-test, bruno-smoke, dps-testautomation, browser-screenshot, hld, lld]
        riskFlags:
          type: array
          items:
            type: string
            enum: [production, customer-data, auth, payment, unclear-scope]
    ReviewMatrixRow:
      type: object
      required:
        - surface
        - expectedEvidence
        - providedEvidence
        - gap
        - nextAction
      properties:
        surface:
          type: string
          enum: [backend, bff, frontend, contract, testing]
        expectedEvidence:
          type: array
          items:
            type: string
        providedEvidence:
          type: array
          items:
            type: string
        gap:
          type: string
        nextAction:
          type: string
    BriefingResponse:
      type: object
      required:
        - signal
        - headline
        - requiredEvidence
        - missingEvidence
        - stopCondition
        - heroNextStep
        - reviewMatrix
      properties:
        signal:
          type: string
          enum: [truce, sparring, shield-wall]
        headline:
          type: string
        requiredEvidence:
          type: array
          items:
            type: string
        missingEvidence:
          type: array
          items:
            type: string
        stopCondition:
          type: string
        heroNextStep:
          type: string
        reviewMatrix:
          type: array
          items:
            $ref: '#/components/schemas/ReviewMatrixRow'
