[tools]
java = "zulu-17"
node = "24"
terraform = "latest"
uv = "latest"

[tasks."be:start"]
description = "Run the Spring Boot API on http://localhost:8080"
dir = "backend"
run = "./gradlew bootRun"

[tasks."be:test"]
description = "Run backend tests"
dir = "backend"
run = "./gradlew test"

[tasks."fe:install"]
description = "Install Angular dependencies"
dir = "frontend"
run = "npm install --registry=https://registry.npmjs.org"

[tasks."fe:ci-install"]
description = "Install Angular dependencies for CI"
dir = "frontend"
run = "npm ci --registry=https://registry.npmjs.org"

[tasks."fe:start"]
description = "Run the Angular app on http://localhost:4200"
dir = "frontend"
run = "npm start"

[tasks."fe:build"]
description = "Build the Angular app"
dir = "frontend"
run = "npm run build"

[tasks."bff:install"]
description = "Install NestJS BFF dependencies"
dir = "bff"
run = "npm install --registry=https://registry.npmjs.org"

[tasks."bff:ci-install"]
description = "Install NestJS BFF dependencies for CI"
dir = "bff"
run = "npm ci --registry=https://registry.npmjs.org"

[tasks."bff:start"]
description = "Run the NestJS BFF on http://localhost:3000"
dir = "bff"
run = "npm run dev"

[tasks."bff:build"]
description = "Build the NestJS BFF"
dir = "bff"
run = "npm run build"

[tasks."contracts:check"]
description = "Check that workshop solution, contract, and runbook artifacts exist"
run = "test -s docs/demo-task.md && test -s ai-runbook/README.md && test -s solution/cobold-briefing/README.md && test -s solution/cobold-briefing/hld.md && test -s solution/cobold-briefing/lld.md && test -s solution/cobold-briefing/decisions.md && test -s solution/cobold-briefing/acceptance-and-test-plan.md && test -s contracts/openapi/cobold-briefing-api.yaml && test -s contracts/plantuml/briefing-flow.puml && test -s contracts/plantuml/briefing-state.puml && test -s contracts/samples/status-response.json && test -s contracts/samples/truce-request.json && test -s contracts/samples/truce-response.json && test -s contracts/samples/sparring-request.json && test -s contracts/samples/sparring-response.json && test -s contracts/samples/shield-wall-request.json && test -s contracts/samples/shield-wall-response.json"

[tasks."api:smoke"]
description = "Run Bruno CLI quick API smoke checks against the running BFF or COBOLD_API_BASE_URL"
dir = "smoke/api"
run = "npx --yes --registry=https://registry.npmjs.org @usebruno/cli run --env local --env-var baseUrl=${COBOLD_API_BASE_URL:-http://localhost:3000} --bail"

[tasks."ui:smoke:install"]
description = "Install Playwright UI smoke dependencies"
dir = "smoke/ui"
run = "npm install --registry=https://registry.npmjs.org && npm run install:browsers"

[tasks."ui:smoke:ci-install"]
description = "Install Playwright UI smoke dependencies for CI"
dir = "smoke/ui"
run = "npm ci --registry=https://registry.npmjs.org && npm run install:browsers"

[tasks."ui:smoke"]
description = "Run quick Playwright UI smoke checks against the running frontend, BFF, and backend"
dir = "smoke/ui"
run = "npm test"

[tasks."ui:smoke:headed"]
description = "Run quick Playwright UI smoke checks in a visible browser"
dir = "smoke/ui"
run = "npm run test:headed"

[tasks."smoke:all"]
description = "Run API and UI smoke checks against the running app stack"
run = ["mise run api:smoke", "mise run ui:smoke"]

[tasks."api:testautomation"]
description = "Run DPS-like robust API testautomation against the running BFF"
run = "PYTHONPATH=testautomation/api uv run --with pytest pytest testautomation/api"

[tasks."ui:install-browsers"]
description = "Install the Chromium browser used by Playwright UI testautomation"
run = "uv run --with playwright python -m playwright install chromium"

[tasks."ui:testautomation"]
description = "Run OneCare-like browser UI testautomation against the running frontend, BFF, and backend"
run = "PYTHONPATH=testautomation/ui uv run --with pytest --with playwright pytest testautomation/ui"

[tasks."testautomation:all"]
description = "Run robust API and UI testautomation against the running app stack"
run = ["mise run api:testautomation", "mise run ui:testautomation"]

[tasks.verify]
description = "Run the demo verification gates"
run = ["mise run contracts:check", "mise run be:test", "mise run bff:build", "mise run fe:build"]

[tasks.ci]
description = "Run the GitHub Actions verification gates"
run = ["mise run fe:ci-install", "mise run bff:ci-install", "mise run verify"]

[tasks."cf:tf:init"]
description = "Initialize the Cloudflare Terraform working directory"
run = "terraform -chdir=infra/terraform/cloudflare init"

[tasks."cf:tf:fmt"]
description = "Format Cloudflare Terraform files"
run = "terraform -chdir=infra/terraform/cloudflare fmt -recursive"

[tasks."cf:tf:validate"]
description = "Validate Cloudflare Terraform configuration"
run = "terraform -chdir=infra/terraform/cloudflare validate"

[tasks."cf:tf:plan"]
description = "Preview Cloudflare Terraform changes"
run = "terraform -chdir=infra/terraform/cloudflare plan"

[tasks."cf:tf:apply"]
description = "Apply reviewed Cloudflare Terraform changes"
run = "terraform -chdir=infra/terraform/cloudflare apply"

[tasks."cf:tf:plan:op"]
description = "Preview Cloudflare Terraform changes with the API token loaded from 1Password"
run = "./infra/terraform/cloudflare/scripts/terraform-with-op-token.sh plan"

[tasks."cf:tf:apply:op"]
description = "Apply reviewed Cloudflare Terraform changes with the API token loaded from 1Password"
run = "./infra/terraform/cloudflare/scripts/terraform-with-op-token.sh apply"
