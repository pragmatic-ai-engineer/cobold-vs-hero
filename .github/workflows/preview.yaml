name: Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed

permissions:
  contents: read
  deployments: write
  packages: write

concurrency:
  group: preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ghcr.io/mimukodik
  RELEASE_NAME: cobold-vs-hero-pr-${{ github.event.pull_request.number }}
  # Previews share the cobold-previews namespace: the CI ServiceAccount is
  # namespace-admin there and nowhere else, and cert-manager issues the
  # preview wildcard secret straight into it (no copying, no kube-system).
  RELEASE_NAMESPACE: cobold-previews
  # Single label below the apex on purpose: Cloudflare's Universal SSL
  # covers one wildcard level, so this shape lets previews ride the proxied
  # * record (the platform repo's cloudflare stack) with the origin hidden.
  APP_HOST: cobold-pr-${{ github.event.pull_request.number }}.mimukodik.hu
  TLS_SECRET_NAME: mimukodik-hu-wildcard-tls
  IMAGE_TAG: pr-${{ github.event.pull_request.number }}-${{ github.sha }}
  KUBECONFIG: /home/github-runner/.kube/cobold-preview-ci.config
  DATADOG_OBSERVABILITY_ENABLED: ${{ vars.DATADOG_OBSERVABILITY_ENABLED }}
  DATADOG_SITE: ${{ vars.DATADOG_SITE }}
  DATADOG_RUM_APPLICATION_ID: ${{ vars.DATADOG_RUM_APPLICATION_ID }}
  DATADOG_RUM_CLIENT_TOKEN: ${{ secrets.DATADOG_RUM_CLIENT_TOKEN }}

jobs:
  build:
    name: Build preview ${{ matrix.service }}
    runs-on: [self-hosted, berek]
    timeout-minutes: 30
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: backend
            image: cobold-vs-hero-backend
          - service: bff
            context: bff
            image: cobold-vs-hero-bff
          - service: frontend
            context: frontend
            image: cobold-vs-hero-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Docker config
        run: |
          echo "DOCKER_CONFIG=$RUNNER_TEMP/docker-config" >> "$GITHUB_ENV"
          mkdir -p "$RUNNER_TEMP/docker-config"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          name: berek-builder-${{ runner.name }}
          keep-state: true
          cleanup: false

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
          DOCKER_BUILD_SUMMARY: false
        with:
          builder: berek-builder-${{ runner.name }}
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          cache-from: type=registry,ref=${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:buildcache,mode=max
          tags: ${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.ref.name=pr-${{ github.event.pull_request.number }}

  deploy:
    name: Deploy preview
    runs-on: [self-hosted, berek]
    timeout-minutes: 20
    needs: build
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    environment:
      name: preview-pr-${{ github.event.pull_request.number }}
      url: https://${{ env.APP_HOST }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for the preview wildcard secret
        run: |
          # Issued into cobold-previews by the Flux-managed Certificate; only
          # gone right after a cluster rebuild while cert-manager still works.
          for i in $(seq 1 60); do
            kubectl -n "$RELEASE_NAMESPACE" get secret "$TLS_SECRET_NAME" >/dev/null 2>&1 && exit 0
            sleep 5
          done
          echo "::error::TLS secret $TLS_SECRET_NAME not found in $RELEASE_NAMESPACE."
          exit 1

      - name: Deploy with Helm
        run: |
          OBSERVABILITY_ARGS=()
          if [ "$DATADOG_OBSERVABILITY_ENABLED" = "true" ] || [ -n "$DATADOG_RUM_CLIENT_TOKEN" ]; then
            OBSERVABILITY_ARGS+=(
              --set observability.enabled=true
              --set observability.datadog.enabled=true
              --set-string observability.datadog.env=preview
              --set-string observability.datadog.version="$IMAGE_TAG"
              --set-string observability.datadog.site="${DATADOG_SITE:-datadoghq.com}"
            )
          fi
          if [ -n "$DATADOG_RUM_CLIENT_TOKEN" ] && [ -n "$DATADOG_RUM_APPLICATION_ID" ]; then
            OBSERVABILITY_ARGS+=(
              --set observability.datadog.browser.enabled=true
              --set-string observability.datadog.browser.clientToken="$DATADOG_RUM_CLIENT_TOKEN"
              --set-string observability.datadog.browser.rumApplicationId="$DATADOG_RUM_APPLICATION_ID"
            )
          fi

          helm upgrade --install "$RELEASE_NAME" deploy/helm/cobold-vs-hero \
            --namespace "$RELEASE_NAMESPACE" \
            --reset-values \
            --set global.imageTag="$IMAGE_TAG" \
            --set global.terminationGracePeriodSeconds=1 \
            --set backend.image.repository="$IMAGE_NAMESPACE/cobold-vs-hero-backend" \
            --set bff.image.repository="$IMAGE_NAMESPACE/cobold-vs-hero-bff" \
            --set frontend.image.repository="$IMAGE_NAMESPACE/cobold-vs-hero-frontend" \
            --set-string ingress.hosts[0].host="$APP_HOST" \
            --set ingress.certManager.enabled=false \
            --set-string 'ingress.tls[0].secretName'="$TLS_SECRET_NAME" \
            --set-string 'ingress.tls[0].hosts[0]'="$APP_HOST" \
            "${OBSERVABILITY_ARGS[@]}"
          kubectl -n "$RELEASE_NAMESPACE" rollout status deploy/"$RELEASE_NAME"-backend --timeout=180s
          kubectl -n "$RELEASE_NAMESPACE" rollout status deploy/"$RELEASE_NAME"-bff --timeout=180s
          kubectl -n "$RELEASE_NAMESPACE" rollout status deploy/"$RELEASE_NAME"-frontend --timeout=180s

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: false

      - name: Install Playwright browser
        run: mise run ui:install-browsers

      - name: Run preview testautomation
        env:
          COBOLD_API_BASE_URL: https://${{ env.APP_HOST }}
          COBOLD_UI_BASE_URL: https://${{ env.APP_HOST }}
        run: mise run testautomation:all

  cleanup:
    name: Cleanup preview
    runs-on: [self-hosted, berek]
    timeout-minutes: 10
    if: github.event.action == 'closed'

    steps:
      - name: Remove preview release
        run: |
          # Shared namespace — uninstall the release only, never the namespace.
          helm uninstall "$RELEASE_NAME" --namespace "$RELEASE_NAMESPACE" --ignore-not-found
