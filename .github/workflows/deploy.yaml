name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ghcr.io/mimukodik
  RELEASE_NAME: cobold-vs-hero
  RELEASE_NAMESPACE: cobold
  APP_HOST: cobold.mimukodik.hu
  # main-<run>-<sha>: the run number gives Flux's ImagePolicy a total order;
  # pushing this tag IS the deploy. The platform (berek repo) pulls it in via
  # image automation — no cluster or platform-repo credentials live here.
  IMAGE_TAG: main-${{ github.run_number }}-${{ github.sha }}
  # Read-only view of the cobold namespace, minted by ansible from the
  # Flux-managed cobold-deploy-watch ServiceAccount; used only to watch the
  # rollout that image automation triggers.
  KUBECONFIG: /home/github-runner/.kube/cobold-deploy-watch.config

jobs:
  build:
    name: Build and push ${{ matrix.service }}
    runs-on: [self-hosted, berek]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: backend
            image: cobold-vs-hero-backend
          - service: bff
            context: bff
            image: cobold-vs-hero-bff
          - service: frontend
            context: frontend
            image: cobold-vs-hero-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Docker config
        run: |
          echo "DOCKER_CONFIG=$RUNNER_TEMP/docker-config" >> "$GITHUB_ENV"
          mkdir -p "$RUNNER_TEMP/docker-config"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          name: berek-builder-${{ runner.name }}
          keep-state: true
          cleanup: false

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
          DOCKER_BUILD_SUMMARY: false
        with:
          builder: berek-builder-${{ runner.name }}
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          cache-from: type=registry,ref=${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:buildcache,mode=max
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:main
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  deploy:
    name: Deploy via GitOps
    runs-on: [self-hosted, berek]
    timeout-minutes: 30
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for Flux to roll the release
        run: |
          # Image automation: reflector scans GHCR, the policy picks this
          # run's tag, the automation commits the bump, Flux applies it.
          # Poll until the backend runs the new tag (scan+automation+sync
          # is a few minutes), then confirm every deployment rolled out.
          deadline=$((SECONDS + 900))
          while [ $SECONDS -lt $deadline ]; do
            img="$(kubectl -n "$RELEASE_NAMESPACE" get deploy "$RELEASE_NAME"-backend \
              -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || true)"
            if [ "${img##*:}" = "$IMAGE_TAG" ]; then
              break
            fi
            sleep 10
          done
          if [ "${img##*:}" != "$IMAGE_TAG" ]; then
            echo "::error::Flux did not apply image tag $IMAGE_TAG within 15 minutes (last seen: ${img:-none})."
            exit 1
          fi
          kubectl -n "$RELEASE_NAMESPACE" rollout status deploy/"$RELEASE_NAME"-backend --timeout=180s
          kubectl -n "$RELEASE_NAMESPACE" rollout status deploy/"$RELEASE_NAME"-bff --timeout=180s
          kubectl -n "$RELEASE_NAMESPACE" rollout status deploy/"$RELEASE_NAME"-frontend --timeout=180s

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: false

      - name: Install smoke UI dependencies
        run: mise run ui:smoke:ci-install

      - name: Run deployed smoke
        id: deployed-smoke
        continue-on-error: true
        env:
          COBOLD_API_BASE_URL: https://${{ env.APP_HOST }}
          COBOLD_UI_BASE_URL: https://${{ env.APP_HOST }}
        run: mise run smoke:all

      - name: Fail deploy after smoke failure
        if: steps.deployed-smoke.outcome == 'failure'
        run: |
          echo "::error::Deployed smoke checks failed against the live release. Roll back by reverting the automation bump commit in mimukodik/berek (or hand-editing the imageTag there) — the platform repo is the deploy interface."
          exit 1
