name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ghcr.io/greg0x
  RELEASE_NAME: cobold-vs-hero
  RELEASE_NAMESPACE: cobold
  APP_HOST: cobold.pragmatic-ai.engineer
  CLUSTER_ISSUER: letsencrypt-prod
  TLS_SECRET_NAME: cobold-pragmatic-ai-engineer-tls
  IMAGE_TAG: ${{ github.sha }}
  KUBECONFIG: /home/github-runner/.kube/config
  DATADOG_OBSERVABILITY_ENABLED: ${{ vars.DATADOG_OBSERVABILITY_ENABLED }}
  DATADOG_SITE: ${{ vars.DATADOG_SITE }}
  DATADOG_RUM_APPLICATION_ID: ${{ vars.DATADOG_RUM_APPLICATION_ID }}
  DATADOG_RUM_CLIENT_TOKEN: ${{ secrets.DATADOG_RUM_CLIENT_TOKEN }}

jobs:
  build:
    name: Build and push ${{ matrix.service }}
    runs-on: [self-hosted, pai]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: backend
            image: cobold-vs-hero-backend
          - service: bff
            context: bff
            image: cobold-vs-hero-bff
          - service: frontend
            context: frontend
            image: cobold-vs-hero-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Docker config
        run: |
          echo "DOCKER_CONFIG=$RUNNER_TEMP/docker-config" >> "$GITHUB_ENV"
          mkdir -p "$RUNNER_TEMP/docker-config"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          name: pai-builder-${{ runner.name }}
          keep-state: true
          cleanup: false

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
          DOCKER_BUILD_SUMMARY: false
        with:
          builder: pai-builder-${{ runner.name }}
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          cache-from: type=registry,ref=${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:buildcache,mode=max
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:main
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  deploy:
    name: Deploy to pai
    runs-on: [self-hosted, pai]
    timeout-minutes: 20
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy with Helm
        run: |
          OBSERVABILITY_ARGS=()
          if [ "$DATADOG_OBSERVABILITY_ENABLED" = "true" ] || [ -n "$DATADOG_RUM_CLIENT_TOKEN" ]; then
            OBSERVABILITY_ARGS+=(
              --set observability.enabled=true
              --set observability.datadog.enabled=true
              --set-string observability.datadog.env=demo
              --set-string observability.datadog.version="$IMAGE_TAG"
              --set-string observability.datadog.site="${DATADOG_SITE:-datadoghq.com}"
            )
          fi
          if [ -n "$DATADOG_RUM_CLIENT_TOKEN" ] && [ -n "$DATADOG_RUM_APPLICATION_ID" ]; then
            OBSERVABILITY_ARGS+=(
              --set observability.datadog.browser.enabled=true
              --set-string observability.datadog.browser.clientToken="$DATADOG_RUM_CLIENT_TOKEN"
              --set-string observability.datadog.browser.rumApplicationId="$DATADOG_RUM_APPLICATION_ID"
            )
          fi

          helm upgrade --install "$RELEASE_NAME" deploy/helm/cobold-vs-hero \
            --namespace "$RELEASE_NAMESPACE" \
            --reset-values \
            --create-namespace \
            --set global.imageTag="$IMAGE_TAG" \
            --set backend.image.repository="$IMAGE_NAMESPACE/cobold-vs-hero-backend" \
            --set bff.image.repository="$IMAGE_NAMESPACE/cobold-vs-hero-bff" \
            --set frontend.image.repository="$IMAGE_NAMESPACE/cobold-vs-hero-frontend" \
            --set-string ingress.hosts[0].host="$APP_HOST" \
            --set-string ingress.certManager.clusterIssuer="$CLUSTER_ISSUER" \
            --set-string 'ingress.tls[0].secretName'="$TLS_SECRET_NAME" \
            --set-string 'ingress.tls[0].hosts[0]'="$APP_HOST" \
            "${OBSERVABILITY_ARGS[@]}"
          kubectl -n "$RELEASE_NAMESPACE" rollout status deploy/"$RELEASE_NAME"-backend --timeout=180s
          kubectl -n "$RELEASE_NAMESPACE" rollout status deploy/"$RELEASE_NAME"-bff --timeout=180s
          kubectl -n "$RELEASE_NAMESPACE" rollout status deploy/"$RELEASE_NAME"-frontend --timeout=180s

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: false

      - name: Install smoke UI dependencies
        run: mise run ui:smoke:ci-install

      - name: Run deployed smoke
        env:
          COBOLD_API_BASE_URL: https://${{ env.APP_HOST }}
          COBOLD_UI_BASE_URL: https://${{ env.APP_HOST }}
        run: mise run smoke:all
