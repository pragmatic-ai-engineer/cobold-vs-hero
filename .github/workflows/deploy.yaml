name: Deploy

# GitOps deploy: CI builds and pushes images, then bumps the image tag in
# pragmatic-ai-engineer/grove (apps/cobold/image-tag.yaml) and Flux rolls
# the release. The runner holds a read-only kubeconfig for watching the
# rollout — deploy authority lives in the grove repo, not on the runner.

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ghcr.io/pragmatic-ai-engineer
  RELEASE_NAME: cobold-vs-hero
  RELEASE_NAMESPACE: cobold
  APP_HOST: cobold.pragmatic-ai.engineer
  IMAGE_TAG: ${{ github.sha }}
  KUBECONFIG: /home/github-runner/.kube/cobold-deploy-watch.config
  GITOPS_REPO: pragmatic-ai-engineer/grove
  GITOPS_FILE: apps/cobold/image-tag.yaml

jobs:
  build:
    name: Build and push ${{ matrix.service }}
    runs-on: [self-hosted, pai]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: backend
            image: cobold-vs-hero-backend
          - service: bff
            context: bff
            image: cobold-vs-hero-bff
          - service: frontend
            context: frontend
            image: cobold-vs-hero-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Docker config
        run: |
          echo "DOCKER_CONFIG=$RUNNER_TEMP/docker-config" >> "$GITHUB_ENV"
          mkdir -p "$RUNNER_TEMP/docker-config"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          name: pai-builder-${{ runner.name }}
          keep-state: true
          cleanup: false

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
          DOCKER_BUILD_SUMMARY: false
        with:
          builder: pai-builder-${{ runner.name }}
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          cache-from: type=registry,ref=${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:buildcache,mode=max
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:main
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  deploy:
    name: Deploy to pai
    runs-on: [self-hosted, pai]
    timeout-minutes: 30
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump image tag in grove
        id: bump
        env:
          GROVE_GITOPS_TOKEN: ${{ secrets.GROVE_GITOPS_TOKEN }}
        run: |
          rm -rf "$RUNNER_TEMP/gitops"
          git clone --depth 10 \
            "https://x-access-token:${GROVE_GITOPS_TOKEN}@github.com/${GITOPS_REPO}" \
            "$RUNNER_TEMP/gitops"
          cd "$RUNNER_TEMP/gitops"

          previous="$(grep -oE -m1 '[0-9a-f]{40}' "$GITOPS_FILE")"
          echo "previous=$previous" >> "$GITHUB_OUTPUT"
          if [ "$previous" = "$IMAGE_TAG" ]; then
            echo "Image tag already at $IMAGE_TAG; nothing to bump."
            exit 0
          fi

          sed -E -i "s/[0-9a-f]{40}/${IMAGE_TAG}/g" "$GITOPS_FILE"
          git -c user.name="cobold-deploy" -c user.email="deploy@pragmatic-ai.engineer" \
            commit -am "Deploy cobold-vs-hero ${IMAGE_TAG}"
          git push origin HEAD:main

      - name: Wait for Flux rollout
        run: |
          deadline=$((SECONDS + 720))
          for service in backend bff frontend; do
            deploy="$RELEASE_NAME-$service"
            until [ "$(kubectl -n "$RELEASE_NAMESPACE" get deploy "$deploy" \
              -o jsonpath='{.spec.template.spec.containers[0].image}')" = \
              "$IMAGE_NAMESPACE/cobold-vs-hero-$service:$IMAGE_TAG" ]; do
              if [ "$SECONDS" -ge "$deadline" ]; then
                echo "::error::Flux did not roll $deploy to $IMAGE_TAG in time."
                exit 1
              fi
              sleep 10
            done
            kubectl -n "$RELEASE_NAMESPACE" rollout status "deploy/$deploy" --timeout=300s
          done

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: false

      - name: Install smoke UI dependencies
        run: mise run ui:smoke:ci-install

      - name: Run deployed smoke
        id: deployed-smoke
        continue-on-error: true
        env:
          COBOLD_API_BASE_URL: https://${{ env.APP_HOST }}
          COBOLD_UI_BASE_URL: https://${{ env.APP_HOST }}
        run: mise run smoke:all

      - name: Revert image tag after smoke failure
        if: steps.deployed-smoke.outcome == 'failure'
        env:
          GROVE_GITOPS_TOKEN: ${{ secrets.GROVE_GITOPS_TOKEN }}
          PREVIOUS_TAG: ${{ steps.bump.outputs.previous }}
        run: |
          echo "::warning::Deployed smoke checks failed; reverting to $PREVIOUS_TAG."
          cd "$RUNNER_TEMP/gitops"
          git pull --rebase origin main
          sed -E -i "s/[0-9a-f]{40}/${PREVIOUS_TAG}/g" "$GITOPS_FILE"
          git -c user.name="cobold-deploy" -c user.email="deploy@pragmatic-ai.engineer" \
            commit -am "Revert cobold-vs-hero to ${PREVIOUS_TAG} after smoke failure"
          git push origin HEAD:main
          for service in backend bff frontend; do
            kubectl -n "$RELEASE_NAMESPACE" rollout status \
              "deploy/$RELEASE_NAME-$service" --timeout=300s || true
          done

      - name: Fail deploy after smoke revert
        if: steps.deployed-smoke.outcome == 'failure'
        run: |
          echo "::error::Deployed smoke checks failed. The image tag was reverted in ${GITOPS_REPO}; keeping this deployment run failed."
          exit 1
