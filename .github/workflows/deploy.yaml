name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ghcr.io/mimukodik
  RELEASE_NAME: cobold-vs-hero
  RELEASE_NAMESPACE: cobold
  APP_HOST: cobold.mimukodik.hu
  IMAGE_TAG: ${{ github.sha }}
  GITOPS_REPO: mimukodik/berek
  GITOPS_FILE: apps/cobold/image-tag.yaml
  # Read-only view of the cobold namespace, minted by ansible from the
  # Flux-managed cobold-deploy-watch ServiceAccount. The deploy itself goes
  # through git (the image-tag bump); the cluster is only watched.
  KUBECONFIG: /home/github-runner/.kube/cobold-deploy-watch.config

jobs:
  build:
    name: Build and push ${{ matrix.service }}
    runs-on: [self-hosted, berek]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: backend
            image: cobold-vs-hero-backend
          - service: bff
            context: bff
            image: cobold-vs-hero-bff
          - service: frontend
            context: frontend
            image: cobold-vs-hero-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Docker config
        run: |
          echo "DOCKER_CONFIG=$RUNNER_TEMP/docker-config" >> "$GITHUB_ENV"
          mkdir -p "$RUNNER_TEMP/docker-config"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          name: berek-builder-${{ runner.name }}
          keep-state: true
          cleanup: false

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
          DOCKER_BUILD_SUMMARY: false
        with:
          builder: berek-builder-${{ runner.name }}
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          cache-from: type=registry,ref=${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:buildcache,mode=max
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:main
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  deploy:
    name: Deploy via GitOps
    runs-on: [self-hosted, berek]
    timeout-minutes: 30
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout gitops repo
        uses: actions/checkout@v4
        with:
          repository: mimukodik/berek
          token: ${{ secrets.BEREK_GITOPS_TOKEN }}
          ref: main
          path: gitops

      - name: Bump deployed image tag
        id: bump
        working-directory: gitops
        run: |
          previous="$(grep -Eo '"[0-9a-f]{40}"' "$GITOPS_FILE" | head -1 | tr -d '"')"
          echo "previous=$previous" >> "$GITHUB_OUTPUT"
          if [ "$previous" = "$IMAGE_TAG" ]; then
            echo "image tag already $IMAGE_TAG; nothing to bump"
            exit 0
          fi
          sed -E -i "s/\"[0-9a-f]{40}\"/\"$IMAGE_TAG\"/g" "$GITOPS_FILE"
          git config user.name "cobold-vs-hero deploy"
          git config user.email "deploy@berek.dev"
          git add "$GITOPS_FILE"
          git commit -m "cobold-vs-hero deploys $IMAGE_TAG"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git pull --rebase origin main
          done
          echo "::error::Could not push the image-tag bump after 3 attempts."
          exit 1

      - name: Wait for Flux to roll the release
        run: |
          # Flux picks the bump up within its sync interval; the HelmRelease
          # re-renders from the ConfigMap. Poll until the backend runs the new
          # tag, then confirm every deployment rolled out.
          deadline=$((SECONDS + 900))
          while [ $SECONDS -lt $deadline ]; do
            img="$(kubectl -n "$RELEASE_NAMESPACE" get deploy "$RELEASE_NAME"-backend \
              -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || true)"
            if [ "${img##*:}" = "$IMAGE_TAG" ]; then
              break
            fi
            sleep 10
          done
          if [ "${img##*:}" != "$IMAGE_TAG" ]; then
            echo "::error::Flux did not apply image tag $IMAGE_TAG within 15 minutes (last seen: ${img:-none})."
            exit 1
          fi
          kubectl -n "$RELEASE_NAMESPACE" rollout status deploy/"$RELEASE_NAME"-backend --timeout=180s
          kubectl -n "$RELEASE_NAMESPACE" rollout status deploy/"$RELEASE_NAME"-bff --timeout=180s
          kubectl -n "$RELEASE_NAMESPACE" rollout status deploy/"$RELEASE_NAME"-frontend --timeout=180s

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: false

      - name: Install smoke UI dependencies
        run: mise run ui:smoke:ci-install

      - name: Run deployed smoke
        id: deployed-smoke
        continue-on-error: true
        env:
          COBOLD_API_BASE_URL: https://${{ env.APP_HOST }}
          COBOLD_UI_BASE_URL: https://${{ env.APP_HOST }}
        run: mise run smoke:all

      - name: Revert image bump after smoke failure
        if: steps.deployed-smoke.outcome == 'failure' && steps.bump.outputs.previous != env.IMAGE_TAG
        working-directory: gitops
        run: |
          echo "::warning::Deployed smoke checks failed; reverting the image-tag bump to ${{ steps.bump.outputs.previous }}."
          sed -E -i "s/\"[0-9a-f]{40}\"/\"${{ steps.bump.outputs.previous }}\"/g" "$GITOPS_FILE"
          git add "$GITOPS_FILE"
          git commit -m "cobold-vs-hero reverts $IMAGE_TAG after failed smoke"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              break
            fi
            git pull --rebase origin main
          done
          deadline=$((SECONDS + 900))
          while [ $SECONDS -lt $deadline ]; do
            img="$(kubectl -n "$RELEASE_NAMESPACE" get deploy "$RELEASE_NAME"-backend \
              -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || true)"
            if [ "${img##*:}" = "${{ steps.bump.outputs.previous }}" ]; then
              break
            fi
            sleep 10
          done
          kubectl -n "$RELEASE_NAMESPACE" rollout status deploy/"$RELEASE_NAME"-backend --timeout=180s || true

      - name: Fail deploy after smoke rollback
        if: steps.deployed-smoke.outcome == 'failure'
        run: |
          echo "::error::Deployed smoke checks failed. The image-tag bump was reverted; keeping this deployment run failed."
          exit 1
