name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify demo repo
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json', 'bff/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Run CI
        run: mise run ci
