name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify demo repo
    runs-on: [self-hosted, pai]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: false

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Run CI
        run: mise run ci
