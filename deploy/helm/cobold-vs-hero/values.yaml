global:
  imageTag: latest
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []
  terminationGracePeriodSeconds: null

backend:
  image:
    repository: ghcr.io/greg0x/cobold-vs-hero-backend
    tag: ""
  replicaCount: 1

bff:
  image:
    repository: ghcr.io/greg0x/cobold-vs-hero-bff
    tag: ""
  replicaCount: 1

frontend:
  image:
    repository: ghcr.io/greg0x/cobold-vs-hero-frontend
    tag: ""
  replicaCount: 1

ingress:
  enabled: true
  className: traefik
  annotations: {}
  certManager:
    enabled: true
    clusterIssuer: letsencrypt-prod
  hosts:
    - host: cobold.pragmatic-ai.engineer
  tls:
    - secretName: cobold-pragmatic-ai-engineer-tls
      hosts:
        - cobold.pragmatic-ai.engineer

resources:
  backend:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 768Mi
  bff:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 384Mi
  frontend:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

observability:
  enabled: false
  datadog:
    enabled: false
    site: datadoghq.com
    env: demo
    version: ""
    serviceNamespace: cobold-vs-hero
    services:
      frontend: cobold-vs-hero-angular
      bff: cobold-vs-hero-bff
      backend: cobold-vs-hero-java
    apm:
      logsInjection: true
      profiling: false
      propagationStyle: datadog,tracecontext
      runtimeMetrics: true
      traceSampleRate: "1.0"
      traceSamplingRules: '[{"sample_rate":1.0}]'
      traceRateLimit: "100"
    browser:
      enabled: false
      clientToken: ""
      rumApplicationId: ""
      allowedTracingUrls: []
      defaultPrivacyLevel: mask-user-input
      sessionReplaySampleRate: 20
      sessionSampleRate: 100
      traceContextInjection: all
      traceSampleRate: 100
      logs:
        enabled: true
        forwardConsoleLogs:
          - warn
          - error
        forwardErrorsToLogs: true
        sessionSampleRate: 100
