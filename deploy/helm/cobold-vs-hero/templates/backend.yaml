apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cobold-vs-hero.fullname" . }}-backend
  labels:
    {{- include "cobold-vs-hero.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
    {{- if include "cobold-vs-hero.datadogEnabled" . }}
    {{- include "cobold-vs-hero.datadogTags" (dict "root" . "component" "backend") | nindent 4 }}
    {{- end }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "cobold-vs-hero.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      {{- if include "cobold-vs-hero.datadogEnabled" . }}
      annotations:
        ad.datadoghq.com/backend.logs: {{ include "cobold-vs-hero.datadogLogConfig" (dict "root" . "component" "backend" "source" "java") }}
      {{- end }}
      labels:
        {{- include "cobold-vs-hero.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
        {{- if include "cobold-vs-hero.datadogEnabled" . }}
        admission.datadoghq.com/enabled: "true"
        {{- include "cobold-vs-hero.datadogTags" (dict "root" . "component" "backend") | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.global.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ . }}
      {{- end }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: {{ include "cobold-vs-hero.image" (dict "root" . "image" .Values.backend.image) | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          {{- if include "cobold-vs-hero.datadogEnabled" . }}
          env:
            {{- include "cobold-vs-hero.datadogEnv" (dict "root" . "component" "backend") | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /api/cobold-vs-hero/status
              port: http
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          resources:
            {{- toYaml .Values.resources.backend | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cobold-vs-hero.fullname" . }}-backend
  labels:
    {{- include "cobold-vs-hero.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    {{- include "cobold-vs-hero.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 8080
      targetPort: http
