apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cobold-vs-hero.fullname" . }}-frontend
  labels:
    {{- include "cobold-vs-hero.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
    {{- if include "cobold-vs-hero.datadogEnabled" . }}
    {{- include "cobold-vs-hero.datadogTags" (dict "root" . "component" "frontend") | nindent 4 }}
    {{- end }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "cobold-vs-hero.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      {{- if include "cobold-vs-hero.datadogEnabled" . }}
      annotations:
        ad.datadoghq.com/frontend.logs: {{ include "cobold-vs-hero.datadogLogConfig" (dict "root" . "component" "frontend" "source" "nginx") }}
      {{- end }}
      labels:
        {{- include "cobold-vs-hero.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
        {{- if include "cobold-vs-hero.datadogEnabled" . }}
        {{- include "cobold-vs-hero.datadogTags" (dict "root" . "component" "frontend") | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.global.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ . }}
      {{- end }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: frontend
          image: {{ include "cobold-vs-hero.image" (dict "root" . "image" .Values.frontend.image) | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: BFF_PROXY_URL
              value: http://{{ include "cobold-vs-hero.fullname" . }}-bff:3000
          ports:
            - name: http
              containerPort: 8080
          {{- if include "cobold-vs-hero.datadogBrowserEnabled" . }}
          volumeMounts:
            - name: datadog-browser-config
              mountPath: /usr/share/nginx/html/datadog-config.js
              subPath: datadog-config.js
              readOnly: true
          {{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          resources:
            {{- toYaml .Values.resources.frontend | nindent 12 }}
      {{- if include "cobold-vs-hero.datadogBrowserEnabled" . }}
      volumes:
        - name: datadog-browser-config
          configMap:
            name: {{ include "cobold-vs-hero.fullname" . }}-datadog-browser
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cobold-vs-hero.fullname" . }}-frontend
  labels:
    {{- include "cobold-vs-hero.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    {{- include "cobold-vs-hero.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 8080
      targetPort: http
