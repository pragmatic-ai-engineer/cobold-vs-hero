apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cobold-vs-hero.fullname" . }}-frontend
  labels:
    {{- include "cobold-vs-hero.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "cobold-vs-hero.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "cobold-vs-hero.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      {{- with .Values.global.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ . }}
      {{- end }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: frontend
          image: {{ include "cobold-vs-hero.image" (dict "root" . "image" .Values.frontend.image) | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: BFF_PROXY_URL
              value: http://{{ include "cobold-vs-hero.fullname" . }}-bff:3000
          ports:
            - name: http
              containerPort: 8080
          {{- if and .Values.observability.enabled .Values.observability.frontend.enabled .Values.observability.frontend.token }}
          volumeMounts:
            - name: betterstack-browser
              mountPath: /usr/share/nginx/html/betterstack-browser.js
              subPath: betterstack-browser.js
              readOnly: true
          {{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          resources:
            {{- toYaml .Values.resources.frontend | nindent 12 }}
      {{- if and .Values.observability.enabled .Values.observability.frontend.enabled .Values.observability.frontend.token }}
      volumes:
        - name: betterstack-browser
          configMap:
            name: {{ include "cobold-vs-hero.fullname" . }}-betterstack-browser
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cobold-vs-hero.fullname" . }}-frontend
  labels:
    {{- include "cobold-vs-hero.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    {{- include "cobold-vs-hero.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 8080
      targetPort: http
