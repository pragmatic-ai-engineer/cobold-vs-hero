apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cobold-vs-hero.fullname" . }}-bff
  labels:
    {{- include "cobold-vs-hero.labels" . | nindent 4 }}
    app.kubernetes.io/component: bff
    {{- if include "cobold-vs-hero.datadogEnabled" . }}
    {{- include "cobold-vs-hero.datadogTags" (dict "root" . "component" "bff") | nindent 4 }}
    {{- end }}
spec:
  replicas: {{ .Values.bff.replicaCount }}
  selector:
    matchLabels:
      {{- include "cobold-vs-hero.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: bff
  template:
    metadata:
      {{- if include "cobold-vs-hero.datadogEnabled" . }}
      annotations:
        ad.datadoghq.com/bff.logs: {{ include "cobold-vs-hero.datadogLogConfig" (dict "root" . "component" "bff" "source" "nodejs") }}
      {{- end }}
      labels:
        {{- include "cobold-vs-hero.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: bff
        {{- if include "cobold-vs-hero.datadogEnabled" . }}
        admission.datadoghq.com/enabled: "true"
        {{- include "cobold-vs-hero.datadogTags" (dict "root" . "component" "bff") | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.global.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ . }}
      {{- end }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: bff
          image: {{ include "cobold-vs-hero.image" (dict "root" . "image" .Values.bff.image) | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: PORT
              value: "3000"
            - name: BACKEND_BASE_URL
              value: http://{{ include "cobold-vs-hero.fullname" . }}-backend:8080
            {{- if include "cobold-vs-hero.datadogEnabled" . }}
            {{- include "cobold-vs-hero.datadogEnv" (dict "root" . "component" "bff") | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/cobold-vs-hero/readiness
              port: http
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          resources:
            {{- toYaml .Values.resources.bff | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cobold-vs-hero.fullname" . }}-bff
  labels:
    {{- include "cobold-vs-hero.labels" . | nindent 4 }}
    app.kubernetes.io/component: bff
spec:
  type: ClusterIP
  selector:
    {{- include "cobold-vs-hero.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: bff
  ports:
    - name: http
      port: 3000
      targetPort: http
